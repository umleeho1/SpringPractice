spring.application.name=shop

# 서버 포트
server.port=8080

# =========================
# MariaDB 설정
# datasource 객체는 실제 데이터베이스 접속하고 쿼리를 전송하고 결과 받아옴
# 이 파일은 설정파일입니다.
# 여기다가 설정하면 스프링이 구동 될께 여기슬 스캔해서.
# datasource라는 객체를 만들어 놓습니다.. 
# 개발자는 datasource라는 객체를 만들지 않고.. 주소를 주입받아 써요
# 이렇게 되면 객체에 대한 컨트롤이 가능합니다. 즉,객체를 몇 개 만들었는지 파악 가능
# 그래서, 스프링은 객체를 개발자가 관리 하지 않고
# 스프링이 관리하고 개발자는 객체의 주소만 주입 받아서 사용합니다.
# 이것을 우리는 IOC 라고 합니다. 제어의 역전..
# 그리고 스프링은 객체를 만들어 보관하는 장소가 컨테이너입니다.
# 개발자는 객체에 대한 설정만 해 주면 스프링이 알아서 객체를 만들어죽
# 필요한 주소를 주입 받는 과정을 의존성 주입이라고 하고 DI라고 합니다.
# 이글을 이해하라면 엄청 많이 생각해야 합니다.
# 수업에 따라 올 때는  객체를 만들지 않고 주입받는 방식이다. 라고 기억하면 됩니다
# =========================
spring.datasource.url=jdbc:mariadb://localhost:3308/shopdb
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# =========================
# MyBatis 설정
# 퍼시스턴스 프레임워크 : 데이터베이스의 CRUD
# 이해하려면 매퍼로 쿼리문을 관리한다. 
# =========================
# 매퍼 위치
mybatis.mapper-locations=classpath:/mappers/**/*.xml 
# 매퍼가 매핑하기 위한 객체의 패키지 주소 
mybatis.type-aliases-package=com.human.shop.vo
# 자바의 카멜과 데이터베이스 컬럼의 스네이크 표기법의 컬럼을 자동으로 매핑
mybatis.configuration.map-underscore-to-camel-case=true
# logging 이거는 로그를 남겨라..
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# thymeleaf
spring.thymeleaf.cache=false

