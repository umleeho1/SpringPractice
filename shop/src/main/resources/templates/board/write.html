<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>

    <style>

        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        .container {
            width: 1000px;
            margin: 30px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
        }

        textarea {
            height: 300px;
            resize: none;
        }

        .file-area {
            border: 2px dashed #aaa;
            padding: 40px;
            text-align: center;
            background-color: #fafafa;
            border-radius: 10px;
        }

        .file-area.dragover {
            background-color: #e8f0ff;
            border-color: royalblue;
        }

        .button-area {
            margin-top: 30px;
            text-align: right;
        }

        .save-btn {
            padding: 12px 25px;
            background-color: royalblue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .preview-list {
            display: flex;
            flex-wrap: wrap;
            margin-top: 20px;
            gap: 10px;
        }

        .preview-item {
            position: relative;
            width: 120px;
            height: 120px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 14px;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f7f7f7;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .file-name {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>

</head>

<body>

<div th:replace="layout/header :: headerFragment"></div>

<div class="container">

    <h2>게시글 작성</h2>

    <form th:action="@{/boards}"
          method="post"
          enctype="multipart/form-data">

        <!-- 작성자 -->
        <div class="form-group">
            <label>작성자</label>
            <input type="text" name="writer">
        </div>

        <!-- 제목 -->
        <div class="form-group">
            <label>제목</label>
            <input type="text" name="title">
        </div>

        <!-- 내용 -->
        <div class="form-group">
            <label>글내용</label>
            <textarea name="content"></textarea>
        </div>

        <!-- 첨부파일 -->
        <div class="form-group">

            <label>첨부파일</label>

            <div class="file-area" id="dropZone">

                <p>파일을 드래그 하세요</p>
                <p>또는</p>

                <input type="file"
                       id="fileInput"
                       multiple
                       name="files"
                       hidden>

                <button type="button"
                        onclick="document.getElementById('fileInput').click()">
                    + 파일 추가
                </button>

            </div>

            <!-- 이미지 미리보기 -->
            <div id="previewList" class="preview-list"></div>

            <!-- 일반 파일 목록 -->
            <div id="fileList" class="file-list"></div>

        </div>

        <!-- 저장 버튼 -->
        <div class="button-area">

            <button type="submit" class="save-btn">
                저장하기
            </button>

        </div>

    </form>

</div>

<div th:replace="layout/footer :: footerFragment"></div>

<script>

    let selectedFiles = [];

    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const previewList = document.getElementById("previewList");
    const fileList = document.getElementById("fileList");

    // 파일 선택
    fileInput.addEventListener("change", function(e) {

        addFiles(e.target.files);

    });

    // 드래그 오버
    dropZone.addEventListener("dragover", function(e) {

        e.preventDefault();
        dropZone.classList.add("dragover");

    });

    // 드래그 떠남
    dropZone.addEventListener("dragleave", function() {

        dropZone.classList.remove("dragover");

    });

    // 드롭
    dropZone.addEventListener("drop", function(e) {

        e.preventDefault();

        dropZone.classList.remove("dragover");

        addFiles(e.dataTransfer.files);

    });

    // 파일 추가
    function addFiles(files) {

        for (let file of files) {

            selectedFiles.push(file);

        }

        syncInput();
        renderFiles();
    }

    // input 동기화
    function syncInput() {

        const dataTransfer = new DataTransfer();

        selectedFiles.forEach(file => {
            dataTransfer.items.add(file);
        });

        fileInput.files = dataTransfer.files;
    }

    // 화면 출력
    function renderFiles() {

        previewList.innerHTML = "";
        fileList.innerHTML = "";

        selectedFiles.forEach((file, index) => {

            // 이미지 파일
            if (file.type.startsWith("image/")) {

                const imgUrl = URL.createObjectURL(file);

                const div = document.createElement("div");

                div.classList.add("preview-item");

                div.innerHTML = `
                    <img src="${imgUrl}">
                    <button type="button"
                            class="remove-btn"
                            onclick="removeFile(${index})">
                        x
                    </button>
                `;

                previewList.appendChild(div);

            } else {

                // 일반 파일

                const div = document.createElement("div");

                div.classList.add("file-item");

                div.innerHTML = `
                    <span class="file-name">
                        ${file.name}
                    </span>

                    <button type="button"
                            class="file-remove-btn"
                            onclick="removeFile(${index})">

                        삭제

                    </button>
                `;

                fileList.appendChild(div);
            }

        });

    }

    // 삭제
    function removeFile(index) {

        selectedFiles.splice(index, 1);

        syncInput();
        renderFiles();

    }

</script>

</body>

</html>
