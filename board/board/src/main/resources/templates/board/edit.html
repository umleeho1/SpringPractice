<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <link rel="stylesheet" th:href="@{/css/photo-style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container">
    <section class="form-card">
        <h2>게시글 수정</h2>

        <form th:action="@{/boards/{id}/edit(id=${board.id})}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-group">
                <label for="title">제목</label>
                <input type="text"
                       id="title"
                       name="title"
                       th:value="${board.title}"
                       required>
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content"
                          name="content"
                          th:text="${board.content}"
                          required></textarea>
            </div>

            <div class="form-group">
                <label>현재 이미지</label>
                <img th:src="@{/uploads/{fileName}(fileName=${board.savedName})}"
                     alt="현재 이미지"
                     style="width:100%; max-height:260px; object-fit:contain; background:#111827; border-radius:12px;">
            </div>

            <div class="form-group">
                <label for="file">이미지 변경</label>
                <input type="file"
                       id="file"
                       name="files"
                       accept="image/*"
                       multiple>
            </div>

            <div class="form-actions">
                <a th:href="@{/boards/{id}(id=${board.id})}" class="btn btn-outline">취소</a>
                <button type="submit" class="btn btn-primary">수정 완료</button>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
