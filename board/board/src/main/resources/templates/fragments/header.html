<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<header class="site-header" th:fragment="header">
    <div class="header-inner">
        <a href="/" class="logo">Board</a>

        <nav class="nav">
            <a href="/">홈</a>
            <a href="/boards">게시판</a>

            <!-- 로그인한 회원만 글쓰기 보임 -->
            <a sec:authorize="isAuthenticated()" href="/boards/write">글 등록</a>

            <!-- 비회원 -->
            <a sec:authorize="isAnonymous()" href="/login">로그인</a>
            <a sec:authorize="isAnonymous()" href="/join">회원가입</a>

            <!-- 로그인 회원 -->
            <span sec:authorize="isAuthenticated()" class="user-badge">
                <span sec:authentication="name"></span>님
            </span>

            <!-- 관리자 메뉴 -->
            <a sec:authorize="hasRole('ADMIN')" href="/admin/boards">관리자</a>

            <!-- 로그아웃 -->
            <form sec:authorize="isAuthenticated()"
                  th:action="@{/logout}"
                  method="post"
                  style="display:inline;">
                <button type="submit">로그아웃</button>
            </form>
        </nav>
    </div>
</header>
</html>
