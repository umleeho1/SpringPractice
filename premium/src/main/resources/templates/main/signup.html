<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: head('회원가입')}"></head>
<body>

<header th:replace="~{layout/header :: header}"></header>

<main class="main-content">
    <div class="form-container">
        <h2>회원가입</h2>
        <form th:action="@{/signup}" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
            </div>
            <button type="submit" class="btn-primary full-width">가입하기</button>
        </form>
        <p class="form-footer">이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a></p>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>

</body>
</html>
